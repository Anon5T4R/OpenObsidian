name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Build renderer
        run: npm run build

      - name: Package Windows installer
        run: npx electron-builder --win --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - uses: actions/upload-artifact@v6
        with:
          name: windows
          path: dist/*.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Build renderer
        run: npm run build

      - name: Package Linux packages
        run: npx electron-builder --linux --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - uses: actions/upload-artifact@v6
        with:
          name: linux
          path: |
            dist/*.AppImage
            dist/*.deb

  # macOS runners are the only way to package for macOS, and GitHub provides
  # them — no Mac hardware needed. The build is unsigned: see the release notes
  # for what a user has to do to open it.
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Build renderer
        run: npm run build

      # macos-latest is Apple Silicon; Intel Macs need their own build
      - name: Package macOS disk images
        run: npx electron-builder --mac --arm64 --x64 --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - uses: actions/upload-artifact@v6
        with:
          name: mac
          path: dist/*.dmg

  release:
    needs: [build-windows, build-linux, build-mac]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/**/*
          generate_release_notes: true
