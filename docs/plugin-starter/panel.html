<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GitHub</title>
<style>
  /* Bridge (app theme vars) is injected above </head> by OpenObsidian */
  html, body { height: 100%; margin: 0; overflow: hidden; }
  body {
    display: flex;
    flex-direction: column;
    gap: 0;
    background: var(--bg);
    color: var(--text);
    font-size: 12px;
    user-select: none;
  }

  /* ── Header ── */
  .header {
    padding: 10px 12px 8px;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .branch-badge {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    font-weight: 600;
    color: var(--accent);
  }
  .header-actions { display: flex; gap: 4px; }
  .icon-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text2);
    cursor: pointer;
    border-radius: 4px;
    padding: 3px 8px;
    font-size: 11px;
    display: flex;
    align-items: center;
    gap: 4px;
    transition: background .12s, color .12s;
  }
  .icon-btn:hover { background: var(--bg3); color: var(--text); border-color: var(--accent); }
  .icon-btn:disabled { opacity: .4; cursor: default; }

  /* ── File list ── */
  .file-list {
    flex: 1;
    overflow-y: auto;
    padding: 6px 0;
    min-height: 0;
  }
  .section-label {
    padding: 4px 12px 2px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: var(--text2);
  }
  .file-row {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 3px 12px;
    font-size: 12px;
  }
  .status-badge {
    flex-shrink: 0;
    width: 14px;
    font-weight: 700;
    font-size: 11px;
    text-align: center;
  }
  .s-M { color: #f59e0b; }
  .s-A { color: var(--success); }
  .s-D { color: var(--danger); }
  .s-R { color: #a78bfa; }
  .s-question { color: var(--text2); }
  .file-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .empty-state {
    padding: 24px 12px;
    text-align: center;
    color: var(--text2);
  }

  /* ── Commit area ── */
  .commit-area {
    border-top: 1px solid var(--border);
    padding: 8px 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex-shrink: 0;
    background: var(--bg2);
  }
  .commit-input {
    width: 100%;
    box-sizing: border-box;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text);
    font-size: 12px;
    padding: 6px 8px;
    font-family: inherit;
    resize: none;
    line-height: 1.4;
  }
  .commit-input:focus { outline: none; border-color: var(--accent); }
  .commit-row { display: flex; gap: 6px; }
  .btn {
    flex: 1;
    border: none;
    border-radius: 5px;
    padding: 6px 10px;
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
    font-weight: 500;
    transition: background .12s;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-primary:disabled { opacity: .4; cursor: default; }
  .btn-secondary { background: var(--bg3); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Log ── */
  .log-area {
    border-top: 1px solid var(--border);
    background: var(--bg);
    max-height: 96px;
    overflow-y: auto;
    padding: 4px 12px;
    font-size: 11px;
    color: var(--text2);
    line-height: 1.45;
    flex-shrink: 0;
    white-space: pre-wrap;
    font-family: 'Cascadia Code', 'Fira Code', monospace;
  }
  .log-area:empty { display: none; }
  .log-ok  { color: var(--success); }
  .log-err { color: var(--danger); }
</style>
</head>
<body>

<div class="header">
  <div class="branch-badge" id="branch">⎇ loading…</div>
  <div class="header-actions">
    <button class="icon-btn" id="btn-pull" title="git pull" disabled>↓ Pull</button>
    <button class="icon-btn" id="btn-refresh" title="Refresh status">↺</button>
  </div>
</div>

<div class="file-list" id="file-list">
  <div class="empty-state">Checking git status…</div>
</div>

<div class="commit-area">
  <textarea class="commit-input" id="commit-msg" placeholder="Commit message…" rows="2"></textarea>
  <div class="commit-row">
    <button class="btn btn-secondary" id="btn-stage-all" disabled>Stage all</button>
    <button class="btn btn-primary" id="btn-commit" disabled>Commit</button>
    <button class="btn btn-secondary" id="btn-push" disabled>↑ Push</button>
  </div>
</div>

<div class="log-area" id="log"></div>

<script>
  var vaultPath = window.VAULT_PATH
  var api = window.pluginApi

  // ── Helpers ─────────────────────────────────────────────────────────────────

  function log(msg, cls) {
    var el = document.getElementById('log')
    var span = document.createElement('span')
    if (cls) span.className = cls
    span.textContent = msg + '\n'
    el.appendChild(span)
    el.scrollTop = el.scrollHeight
  }

  function git() {
    var args = Array.prototype.slice.call(arguments)
    return api.exec('git', args, vaultPath)
  }

  function setBusy(busy) {
    ['btn-pull','btn-refresh','btn-stage-all','btn-commit','btn-push'].forEach(function(id){
      document.getElementById(id).disabled = busy
    })
  }

  // ── Status ──────────────────────────────────────────────────────────────────

  function renderFiles(lines) {
    var list = document.getElementById('file-list')
    list.innerHTML = ''

    if (!lines.length) {
      list.innerHTML = '<div class="empty-state">✓ Working tree clean</div>'
      return
    }

    var staged   = lines.filter(function(l){ return l[0] !== ' ' && l[0] !== '?' })
    var unstaged = lines.filter(function(l){ return l[1] !== ' ' })
    var untracked= lines.filter(function(l){ return l[0] === '?' })

    function addSection(title, items, col) {
      if (!items.length) return
      var lbl = document.createElement('div')
      lbl.className = 'section-label'
      lbl.textContent = title
      list.appendChild(lbl)
      items.forEach(function(l) {
        var row  = document.createElement('div'); row.className = 'file-row'
        var badge= document.createElement('span'); badge.className = 'status-badge s-' + (l[col] === '?' ? 'question' : l[col])
        badge.textContent = l[col]
        var name = document.createElement('span'); name.className = 'file-name'
        name.textContent = l.slice(3)
        row.appendChild(badge); row.appendChild(name)
        list.appendChild(row)
      })
    }

    addSection('Staged', staged, 0)
    addSection('Modified / Deleted', unstaged, 1)
    addSection('Untracked', untracked, 0)
  }

  async function refresh() {
    if (!vaultPath) {
      document.getElementById('file-list').innerHTML = '<div class="empty-state">No vault open.</div>'
      return
    }
    setBusy(true)
    try {
      var br = await git('rev-parse', '--abbrev-ref', 'HEAD')
      if (br.code !== 0) {
        document.getElementById('branch').textContent = '⎇ not a git repo'
        document.getElementById('file-list').innerHTML = '<div class="empty-state">Not a git repository.<br><small>Run <code>git init</code> in your vault folder to start.</small></div>'
        return
      }
      document.getElementById('branch').textContent = '⎇ ' + br.stdout

      var st = await git('status', '--porcelain')
      var lines = st.stdout ? st.stdout.split('\n').filter(Boolean) : []
      renderFiles(lines)

      var hasChanges = lines.length > 0
      document.getElementById('btn-stage-all').disabled = !hasChanges
      document.getElementById('btn-commit').disabled = false
      document.getElementById('btn-push').disabled = false
      document.getElementById('btn-pull').disabled = false
    } catch(e) {
      log('Error: ' + e, 'log-err')
    } finally {
      setBusy(false)
    }
  }

  // ── Actions ─────────────────────────────────────────────────────────────────

  document.getElementById('btn-refresh').addEventListener('click', refresh)

  document.getElementById('btn-stage-all').addEventListener('click', async function() {
    setBusy(true)
    var r = await git('add', '-A')
    if (r.code === 0) { log('Staged all changes', 'log-ok') }
    else { log(r.stderr || 'git add failed', 'log-err') }
    await refresh()
  })

  document.getElementById('btn-commit').addEventListener('click', async function() {
    var msg = document.getElementById('commit-msg').value.trim()
    if (!msg) { log('Enter a commit message first', 'log-err'); return }
    setBusy(true)
    var r = await git('commit', '-m', msg)
    if (r.code === 0) {
      log(r.stdout || 'Committed', 'log-ok')
      document.getElementById('commit-msg').value = ''
    } else {
      log(r.stderr || r.stdout || 'Commit failed', 'log-err')
    }
    await refresh()
  })

  document.getElementById('btn-push').addEventListener('click', async function() {
    setBusy(true)
    log('Pushing…')
    var r = await git('push')
    if (r.code === 0) { log(r.stdout || r.stderr || 'Pushed', 'log-ok') }
    else { log(r.stderr || 'Push failed', 'log-err') }
    await refresh()
  })

  document.getElementById('btn-pull').addEventListener('click', async function() {
    setBusy(true)
    log('Pulling…')
    var r = await git('pull')
    if (r.code === 0) { log(r.stdout || r.stderr || 'Up to date', 'log-ok') }
    else { log(r.stderr || 'Pull failed', 'log-err') }
    await refresh()
  })

  // ── Init ─────────────────────────────────────────────────────────────────────
  refresh()
</script>
</body>
</html>
